services:
  gladoss:
    build: .
    container_name: gladoss
    image: gladoss:latest
    volumes:
      - source: ./backup/
        target: /mnt/backup
        type: bind
        bind:
          create_host_path: true
      - source: ./logs/
        target: /var/log/gladoss
        type: bind
        bind:
          create_host_path: true
    ports:
      - "8000:8000"
  gladoss-demo:
    build: .
    container_name: gladoss-demo
    image: gladoss:latest
    volumes:
      - source: ./logs/
        target: /var/log/gladoss
        type: bind
        bind:
          create_host_path: true
    expose:
      - "8000"
    entrypoint: ''
    command: gladoss-demo --verbose --cachesize=5 --port 8000
